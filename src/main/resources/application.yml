server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/zenpay?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        boot:
          allow_jdbc_metadata_access: false
        format_sql: true
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  secret: zenpay-secret-key-must-be-at-least-32-characters-long
  access-expiration: 1800000
  refresh-expiration: 604800000

logging:
  level:
    com.zenpay: DEBUG
    org.hibernate.SQL: DEBUG