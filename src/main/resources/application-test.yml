spring:
  datasource:
    url: jdbc:h2:mem:zenpay;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6370   # 테스트용 포트 (필요시 embedded-redis 라이브러리 추가)
